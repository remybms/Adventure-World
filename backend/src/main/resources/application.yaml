spring:
  application:
    name: fantasy-war

  datasource:
    url: jdbc:h2:mem:fantasy;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
      properties:
        hibernate:
          format_sql: true
          jdbc:
            time_zone: UTC

  h2:
    console:
      enabled: true
      path: /h2

app:
  jwt:
    secret: ${APP_JWT_SECRET:zK8Z7V8XKpX7r8h4zKz2zVQ2vYw3p3Zkz9j3Q2m7QkQ=}
    issuer: ${APP_JWT_ISSUER:fantasy_war}
    exp-minutes: ${APP_JWT_EXP_MINUTES:60}