openapi: 3.0.3
info:
  title: API Gestion des Aventuriers
  description: API REST pour la gestion des aventuriers — création, consultation, modification et suppression.
  version: 1.0.0
  contact:
    name: Guilde des Aventuriers
servers:
  - url: http://localhost:8080
    description: Serveur local de développement
  - url: https://aventuriers.digicrafters.fr
    description: Serveur de production

tags:
  - name: Aventuriers
    description: Opérations CRUD sur les aventuriers
  - name: Users
    description: Authentifications des utilisateurs

paths:
  /api/v1/aventuriers:
    get:
      tags: [Aventuriers]
      summary: Lister tous les aventuriers
      operationId: listerAventuriers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AventurierDto'
        '500':
          $ref: '#/components/responses/ErreurServeur'

    post:
      tags: [Aventuriers]
      security:
        - bearerAuth: []
      summary: Créer un aventurier
      operationId: creerAventurier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierPayload'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '400':
          $ref: '#/components/responses/RequeteInvalide'
        '500':
          $ref: '#/components/responses/ErreurServeur'

  /api/v1/aventuriers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Aventuriers]
      summary: Consulter un aventurier
      operationId: obtenirAventurier
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '404':
          $ref: '#/components/responses/NonTrouve'
        '500':
          $ref: '#/components/responses/ErreurServeur'

    put:
      tags: [Aventuriers]
      security:
        - bearerAuth: []
      summary: Modifier un aventurier
      operationId: modifierAventurier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierPayload'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '400':
          $ref: '#/components/responses/RequeteInvalide'
        '404':
          $ref: '#/components/responses/NonTrouve'
        '500':
          $ref: '#/components/responses/ErreurServeur'

    delete:
      tags: [Aventuriers]
      security:
        - bearerAuth: []
      summary: Supprimer un aventurier
      operationId: supprimerAventurier
      responses:
        '204':
          description: Supprimé
        '404':
          $ref: '#/components/responses/NonTrouve'
        '500':
          $ref: '#/components/responses/ErreurServeur'

  /auth/login:
    post:
      tags: [Users]
      summary: Permet à l'utilisateur de se connecter
      operationId: connexion
      responses:
        '200':
          description: Utilisateur connecté
        '404':
          description: Utilisateur introuvable

  /auth/signin:
    post:
      tags: [Users]
      summary: Permet à un nouvel utilisateur de se créer un compte
      operationId: inscription
      responses:
        '200':
          description: Utilisateur créé

  /auth/logout:
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Déconnexion d'un utilisateur
      operationId: deconnexion
      responses:
        '200':
          description: Logout successful

components:
  schemas:
    AventurierPayload:
      type: object
      required: [nom, physique, mental, perception, niveau, classe]
      properties:
        nom:
          type: string
          minLength: 3
        description:
          type: string
        physique:
          type: integer
          minimum: 1
          maximum: 50
        mental:
          type: integer
          minimum: 1
          maximum: 50
        perception:
          type: integer
          minimum: 1
          maximum: 50
        niveau:
          type: integer
          minimum: 1
          maximum: 100
        classe:
          type: string
          enum: [GUERRIER, MAGE, RODEUR, VOLEUR, CLERC, BARDE, DRUIDE, PALADIN, BARBARE, MOINE]

    AventurierDto:
      allOf:
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
        - $ref: '#/components/schemas/AventurierPayload'

    Erreur:
      type: object
      required: [statut, message]
      properties:
        statut:
          type: integer
        message:
          type: string

  responses:
    RequeteInvalide:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    NonTrouve:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    ErreurServeur:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
