openapi: 3.0.3

info:
  title: API Gestion des Aventuriers
  description: API REST sécurisée pour la gestion des aventuriers et des compétences
  version: 2.0.0

servers:
  - url: http://localhost:8080
  - url: https://aventuriers.digicrafters.fr

tags:
  - name: Auth
  - name: Aventuriers
  - name: Competences

security:
  - bearerAuth: []

paths:

  ########################
  # AUTH (PUBLIC)
  ########################

  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription utilisateur (PUBLIC)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Utilisateur créé

  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur (PUBLIC)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Token JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnexion (AUTHENTIFIÉ)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Déconnecté
        '401':
          $ref: '#/components/responses/Unauthorized'

  ########################
  # AVENTURIERS
  ########################

  /api/v1/aventuriers:
    get:
      tags: [Aventuriers]
      summary: Lister les aventuriers (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: size
          schema:
            type: integer
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AventurierDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Aventuriers]
      summary: Créer un aventurier (ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierPayload'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/aventuriers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Aventuriers]
      summary: Consulter un aventurier (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Aventuriers]
      summary: Modifier un aventurier (ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierPayload'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags: [Aventuriers]
      summary: Supprimer un aventurier (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Supprimé

  ########################
  # COMPETENCES (F1-F5)
  ########################

  /api/v1/competences:
    get:
      tags: [Competences]
      summary: Lister les compétences (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des compétences

    post:
      tags: [Competences]
      summary: Créer une compétence (ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Competence'
      responses:
        '201':
          description: Créée
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/competences/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Competences]
      summary: Détail compétence (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

    put:
      tags: [Competences]
      summary: Modifier compétence (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Modifiée
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags: [Competences]
      summary: Supprimer compétence (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Supprimée
        '409':
          $ref: '#/components/responses/Conflict'

  ########################
  # ASSOCIATION (F6-F8)
  ########################

  /api/v1/aventuriers/{id}/competences:
    get:
      tags: [Competences]
      summary: Compétences d’un aventurier (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste

  /api/v1/aventuriers/{id}/competences/{cId}:
    post:
      tags: [Competences]
      summary: Ajouter compétence (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Ajoutée
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Competences]
      summary: Retirer compétence (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Retirée
        '409':
          $ref: '#/components/responses/Conflict'

  ########################
  # VUES (F9-F10)
  ########################

  /api/v1/aventuriers/{id}/competences/disponibles:
    get:
      tags: [Competences]
      summary: Compétences disponibles/bloquées (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /api/v1/competences/{id}/aventuriers:
    get:
      tags: [Competences]
      summary: Aventuriers liés (VIEWER, ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    AuthRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string

    AventurierPayload:
      type: object
      required: [nom, physique, mental, perception, classe]
      properties:
        nom:
          type: string
        description:
          type: string
        physique:
          type: integer
        mental:
          type: integer
        perception:
          type: integer
        niveau:
          type: integer
        classe:
          type: string

    AventurierDto:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
        - $ref: '#/components/schemas/AventurierPayload'

    Competence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
        description:
          type: string
        classeRequise:
          type: string
        niveauMinimum:
          type: integer
        competencesRequises:
          type: array
          items:
            type: string
            format: uuid

    ErrorDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        aventuriersImpactes:
          type: array
          items:
            type: object
        prerequisManquants:
          type: array
          items:
            type: object

  responses:

    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    BadRequest:
      description: Requête invalide

    NotFound:
      description: Non trouvé

    Conflict:
      description: Conflit métier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    UnprocessableEntity:
      description: Pré-requis non satisfaits
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'