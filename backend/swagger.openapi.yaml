openapi: 3.0.3

info:
  title: API Gestion des Aventuriers
  description: API REST sécurisée pour la gestion des aventuriers et des compétences
  version: 2.0.0

servers:
  - url: http://localhost:8080
  - url: https://aventuriers.digicrafters.fr

tags:
  - name: Auth
  - name: Aventuriers
  - name: Competences

security:
  - bearerAuth: []

paths:

  ########################
  # AUTH (PUBLIC)
  ########################

  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription utilisateur (PUBLIC)
      operationId: inscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Utilisateur créé

  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur (PUBLIC)
      operationId: connexion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Token JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnexion (AUTHENTIFIÉ)
      operationId: deconnexion
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Déconnecté

  ########################
  # AVENTURIERS
  ########################

  /api/v1/aventuriers:
    get:
      tags: [Aventuriers]
      summary: Lister tous les aventuriers
      operationId: listerAventuriers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AventurierDto'
        '500':
          $ref: '#/components/responses/ErreurServeur'

    post:
      tags: [Aventuriers]
      summary: Créer un aventurier
      operationId: creerAventurier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierPayload'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '400':
          $ref: '#/components/responses/RequeteInvalide'
        '500':
          $ref: '#/components/responses/ErreurServeur'

  /api/v1/aventuriers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Aventuriers]
      summary: Consulter un aventurier
      operationId: obtenirAventurier
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '404':
          $ref: '#/components/responses/NonTrouve'
        '500':
          $ref: '#/components/responses/ErreurServeur'

    put:
      tags: [Aventuriers]
      summary: Modifier un aventurier
      operationId: modifierAventurier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierPayload'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AventurierDto'
        '400':
          $ref: '#/components/responses/RequeteInvalide'
        '404':
          $ref: '#/components/responses/NonTrouve'
        '500':
          $ref: '#/components/responses/ErreurServeur'

    delete:
      tags: [Aventuriers]
      summary: Supprimer un aventurier
      operationId: supprimerAventurier
      responses:
        '204':
          description: Supprimé
        '404':
          $ref: '#/components/responses/NonTrouve'
        '500':
          $ref: '#/components/responses/ErreurServeur'

  ########################
  # COMPETENCES
  ########################

  /api/v1/competences:
    get:
      tags: [Competences]
      summary: Lister les compétences
      operationId: listerCompetences
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des compétences

    post:
      tags: [Competences]
      summary: Créer une compétence
      operationId: creerCompetence
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Créée

  /api/v1/competences/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Competences]
      summary: Détail compétence
      operationId: obtenirCompetence
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

    put:
      tags: [Competences]
      summary: Modifier compétence
      operationId: modifierCompetence
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Modifiée

    delete:
      tags: [Competences]
      summary: Supprimer compétence
      operationId: supprimerCompetence
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Supprimée

  ########################
  # ASSOCIATION
  ########################

  /api/v1/aventuriers/{id}/competences:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Competences]
      summary: Compétences d’un aventurier
      operationId: listerCompetencesAventurier
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste

  /api/v1/aventuriers/{id}/competences/{cId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: cId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Competences]
      summary: Ajouter compétence
      operationId: ajouterCompetenceAventurier
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Ajoutée

    delete:
      tags: [Competences]
      summary: Retirer compétence
      operationId: retirerCompetenceAventurier
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Retirée

  ########################
  # VUES
  ########################

  /api/v1/aventuriers/{id}/competences/disponibles:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Competences]
      summary: Compétences disponibles/bloquées
      operationId: obtenirCompetencesDisponibles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /api/v1/competences/{id}/aventuriers:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Competences]
      summary: Aventuriers liés
      operationId: listerAventuriersParCompetence
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    AuthRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string

    AventurierPayload:
      type: object
      required: [nom, physique, mental, perception, classe]
      properties:
        nom:
          type: string
          minLength: 3
        description:
            type: string
        physique:
            type: integer
            minimum: 1
            maximum: 50
        mental:
            type: integer
            minimum: 1
            maximum: 50
        perception:
            type: integer
            minimum: 1
            maximum: 50
        niveau:
            type: integer
            minimum: 1
            maximum: 100
        classe:
          type: string
          enum: [GUERRIER, MAGE, RODEUR, VOLEUR, CLERC, BARDE, DRUIDE, PALADIN, BARBARE, MOINE]

    AventurierDto:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
        - $ref: '#/components/schemas/AventurierPayload'

    Competence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
        description:
          type: string
        classeRequise:
          type: string
        niveauMinimum:
          type: integer
        competencesRequises:
          type: array
          items:
            type: string
            format: uuid

    ErrorDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        aventuriersImpactes:
          type: array
          items:
            type: object
        prerequisManquants:
          type: array
          items:
            type: object
    Erreur:
      type: object
      required: [ statut, message ]
      properties:
        statut:
          type: integer
        message:
          type: string

  responses:
    RequeteInvalide:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    NonTrouve:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    ErreurServeur:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    BadRequest:
      description: Requête invalide

    NotFound:
      description: Non trouvé

    Conflict:
      description: Conflit métier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    UnprocessableEntity:
      description: Pré-requis non satisfaits
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'